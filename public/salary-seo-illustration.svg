<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0B1020"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#121A2B" stroke="#22314D"/>
  <text x="100" y="150" fill="#F8FAFC" font-size="44" font-family="Arial, sans-serif" font-weight="700">Hourly to Salary Calculator</text>
  <text x="100" y="198" fill="#A5B4FC" font-size="24" font-family="Arial, sans-serif">Convert Hourly Pay into Annual Compensation</text>

  <rect x="100" y="250" width="500" height="260" rx="18" fill="#0E1628" stroke="#334155"/>
  <text x="130" y="295" fill="#C4B5FD" font-size="22" font-family="Arial, sans-serif" font-weight="700">Conversion Logic</text>
  <text x="130" y="340" fill="#E2E8F0" font-size="20" font-family="Arial, sans-serif">Hourly Rate x Hours/Week x 52</text>
  <text x="130" y="380" fill="#94A3B8" font-size="18" font-family="Arial, sans-serif">Adjust for unpaid time off if needed</text>

  <rect x="640" y="250" width="460" height="260" rx="18" fill="#1E1B4B" stroke="#4338CA"/>
  <text x="670" y="295" fill="#DDD6FE" font-size="22" font-family="Arial, sans-serif" font-weight="700">Example</text>
  <text x="670" y="340" fill="#F8FAFC" font-size="20" font-family="Arial, sans-serif">$30/hour x 40 x 52</text>
  <text x="670" y="380" fill="#F8FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">= $62,400 / year</text>

  <rect x="670" y="420" width="300" height="46" rx="10" fill="#4F46E5"/>
  <text x="695" y="450" fill="#F8FAFC" font-size="20" font-family="Arial, sans-serif" font-weight="700">Budget with Confidence</text>
</svg>
