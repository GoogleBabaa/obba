<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Federal tax landscape visualization">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg1)"/>
  <rect x="80" y="90" width="1040" height="520" rx="24" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="120" y="150" fill="#e2e8f0" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">2026 Federal Tax Landscape</text>
  <text x="120" y="188" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Bracket shifts, inflation indexing, and withholding strategy</text>

  <rect x="120" y="230" width="960" height="2" fill="#1e293b"/>

  <g transform="translate(130 270)">
    <rect x="0" y="220" width="110" height="150" rx="10" fill="url(#acc1)"/>
    <rect x="140" y="180" width="110" height="190" rx="10" fill="url(#acc1)"/>
    <rect x="280" y="130" width="110" height="240" rx="10" fill="url(#acc1)"/>
    <rect x="420" y="95" width="110" height="275" rx="10" fill="url(#acc1)"/>
    <rect x="560" y="65" width="110" height="305" rx="10" fill="url(#acc1)"/>
    <rect x="700" y="40" width="110" height="330" rx="10" fill="url(#acc1)"/>
    <text x="0" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">10%</text>
    <text x="140" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">12%</text>
    <text x="280" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">22%</text>
    <text x="420" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">24%</text>
    <text x="560" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">32%</text>
    <text x="700" y="410" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">35%+</text>
  </g>
</svg>
