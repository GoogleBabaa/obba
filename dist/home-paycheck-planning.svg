<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Paycheck planning and budgeting illustration">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1328"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg2)"/>
  <rect x="70" y="80" width="1060" height="540" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="120" y="145" fill="#e2e8f0" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Paycheck Planning Overview</text>
  <text x="120" y="182" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Gross pay, withholding, FICA, and net income allocation</text>

  <g transform="translate(120 230)">
    <rect x="0" y="0" width="300" height="300" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="24" y="40" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">Gross Income</text>
    <text x="24" y="92" fill="#22d3ee" font-size="44" font-weight="700" font-family="Segoe UI, Arial, sans-serif">$6,000</text>
    <text x="24" y="130" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Monthly Example</text>
    <rect x="24" y="160" width="252" height="14" rx="7" fill="#1e293b"/>
    <rect x="24" y="160" width="175" height="14" rx="7" fill="url(#acc2)"/>
  </g>

  <g transform="translate(460 230)">
    <rect x="0" y="0" width="300" height="300" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="24" y="40" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">Deductions</text>
    <text x="24" y="82" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">Federal Tax</text>
    <text x="220" y="82" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">$950</text>
    <text x="24" y="122" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">FICA</text>
    <text x="220" y="122" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">$459</text>
    <text x="24" y="162" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">Pre-tax</text>
    <text x="220" y="162" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">$300</text>
    <rect x="24" y="210" width="252" height="2" fill="#334155"/>
    <text x="24" y="252" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">Total: $1,709</text>
  </g>

  <g transform="translate(800 230)">
    <rect x="0" y="0" width="300" height="300" rx="18" fill="#111827" stroke="#1f2937"/>
    <text x="24" y="40" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">Net Pay</text>
    <text x="24" y="92" fill="#22d3ee" font-size="44" font-weight="700" font-family="Segoe UI, Arial, sans-serif">$4,291</text>
    <text x="24" y="130" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Budget-ready cash flow</text>
    <circle cx="62" cy="210" r="26" fill="#0f766e"/>
    <circle cx="132" cy="210" r="26" fill="#155e75"/>
    <circle cx="202" cy="210" r="26" fill="#1d4ed8"/>
  </g>
</svg>
